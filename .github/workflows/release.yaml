name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - run: corepack enable
      - run: yarn install --immutable

      - name: Build package
        run: |
          PKG="companion-module-oxide-${GITHUB_REF_NAME}.tgz"
          tar czf "../${PKG}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules/.cache' \
            .
          echo "PKG=${PKG}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ../${{ env.PKG }}
          generate_release_notes: true
